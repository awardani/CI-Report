[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/intercom-datasets"
  to = "/.netlify/functions/intercom-datasets"
  status = 200

[[redirects]]
  from = "/api/learnworlds-datasets"
  to = "/.netlify/functions/learnworlds-datasets"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
